<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathClass — Модератор</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/BG.mp4" type="video/mp4" />
    </video>

    <main class="panel mod-panel">
      <section id="modPanelBlock" class="hidden">
        <div class="head-row">
          <div>
            <h1>Панель модератора</h1>
            <p class="sub">Списки игроков и моментальная проверка профиля</p>
          </div>
          <button id="goMainBtn" type="button" class="ghost">На главную</button>
        </div>

        <p id="modStatus" class="status"></p>

        <div class="tab-row">
          <button id="tabUnverified" class="tab-btn" type="button">Неверифицированные</button>
          <button id="tabVerified" class="tab-btn ghost" type="button">Верифицированные</button>
        </div>

        <section id="unverifiedSection">
          <ul id="unverifiedList" class="list row-list"></ul>
        </section>

        <section id="verifiedSection" class="hidden">
          <ul id="verifiedList" class="list row-list"></ul>
        </section>
      </section>

      <section id="modDeniedBlock" class="hidden">
        <h1>Доступ закрыт</h1>
        <p id="modDeniedText" class="status error always">Недостаточно прав.</p>
        <div class="blocked-visual">
          <img src="assets/access.jpg" alt="Доступ ограничен" />
        </div>
        <button id="goMainDeniedBtn" type="button" class="ghost">На главную</button>
      </section>
    </main>

    <section id="modUserModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="modModalName">Профиль игрока</h2>
          <button id="modModalClose" type="button" class="ghost slim">Закрыть</button>
        </div>
        <div id="modModalInfo" class="modal-info"></div>
        <div class="modal-actions">
          <button id="modVerifyToggleBtn" type="button">Снять / поставить верификацию</button>
        </div>
      </div>
    </section>

    <script type="module" src="moderator.js"></script>
  </body>
</html>
