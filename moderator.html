<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathClass — Модератор</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Панель модератора</h1>

      <div id="submissions" class="submissions"></div>
      <button id="goMainBtn" type="button" class="secondary">Назад на главную</button>

    <script type="module" src="moderator.js"></script>
