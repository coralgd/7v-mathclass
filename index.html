<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathClass — Вход</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/BG.mp4" type="video/mp4" />
    </video>

    <main class="panel auth-panel">
      <h1>MathClass</h1>
      <p class="sub">Вход и регистрация</p>

      <label for="email">Почта</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@email.com" />

      <label for="password">Пароль</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

      <div class="row">
        <button id="registerBtn" type="button">Регистрация</button>
        <button id="loginBtn" type="button" class="ghost">Вход</button>
      </div>

      <p id="status" class="status"></p>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
